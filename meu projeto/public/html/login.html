<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <title>Gestão de peças</title>
</head>
<body>
    <form id="loginForm">
    <p>Usuário</p>
    <input id="usuario" type="text" placeholder="Digite seu nome de usuário" required>
    <p>Senha</p>
    <input id="senha" type="password" placeholder="Digite sua senha" required>
    <div class="botão">
        <button type="submit">Fazer Login</button>
    </div>
</form>
</body>
</html>
